<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snip — URL Shortener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a08;
    --bg2: #111110;
    --bg3: #1a1a18;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.16);
    --text: #f0ede6;
    --text-muted: #7a7870;
    --text-dim: #4a4840;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --accent-border: rgba(200,240,96,0.3);
    --red: #ff6b6b;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 4rem 1.5rem 6rem;
  }

  /* header */
  .header {
    margin-bottom: 3.5rem;
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.5rem;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 18px; height: 18px; color: #0a0a08; }

  .logo-text {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .tagline {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* input card */
  .input-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .url-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 0 14px;
    height: 44px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .url-input::placeholder { color: var(--text-dim); }
  .url-input:focus { border-color: var(--accent-border); }

  .shorten-btn {
    height: 44px;
    padding: 0 20px;
    background: var(--accent);
    color: #0a0a08;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .shorten-btn:hover { opacity: 0.88; }
  .shorten-btn:active { transform: scale(0.97); }
  .shorten-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    font-size: 12px;
    color: var(--red);
    margin-top: 10px;
  }

  /* result card */
  .result-card {
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.4s ease both;
  }

  .result-label {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .result-url {
    flex: 1;
    font-size: 14px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.4;
  }

  .copy-btn {
    height: 36px;
    padding: 0 14px;
    background: transparent;
    border: 1px solid var(--accent-border);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .copy-btn:hover { background: var(--accent-dim); }
  .copy-btn.copied { color: var(--text); border-color: var(--border); }

  /* section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
    margin-top: 2rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .section-title {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .clear-btn {
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--red); }

  /* history list */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.6s 0.25s ease both;
  }

  .history-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    transition: border-color 0.2s;
  }

  .history-item:hover { border-color: var(--border-hover); }

  .history-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .history-original {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .history-time {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .history-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .history-short {
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .history-short:hover { opacity: 0.7; }

  .history-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .click-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 2px 10px;
  }

  .click-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
  }

  .history-copy {
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: color 0.2s;
  }

  .history-copy:hover { color: var(--text); }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-dim);
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    animation: fadeUp 0.6s 0.25s ease both;
  }

  .empty-icon {
    font-size: 28px;
    margin-bottom: 0.75rem;
    opacity: 0.4;
  }

  /* loading spinner */
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(10,10,8,0.3);
    border-top-color: #0a0a08;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  /* stats row */
  .stats-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .stat-card {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1rem;
  }

  .stat-val {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 480px) {
    .app { padding: 2rem 1rem 4rem; }
    .input-row { flex-direction: column; }
    .shorten-btn { width: 100%; }
    .stats-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState, useCallback } = React;

const API_BASE = 'https://924kmz8j3d.execute-api.us-east-2.amazonaws.com/Production';

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function isValidUrl(str) {
  try { new URL(str); return true; } catch { return false; }
}

function App() {
  const [url, setUrl] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [latest, setLatest] = useState(null);
  const [history, setHistory] = useState([]);
  const [copiedId, setCopiedId] = useState(null);

  const totalClicks = history.reduce((a, h) => a + (h.clicks || 0), 0);

  const shorten = useCallback(async () => {
    if (!url.trim()) { setError('Please enter a URL'); return; }
    if (!isValidUrl(url.trim())) { setError('Please enter a valid URL (include https://)'); return; }
    setError('');
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/shorten`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url.trim() })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Something went wrong');
const item = {
  id: data.short_id,
  shortUrl: data.short_url,
  displayUrl: `snip/${data.short_id}`,
  originalUrl: url.trim(),
  createdAt: Date.now(),
  clicks: 0
};
      setLatest(item);
      setHistory(prev => [item, ...prev]);
      setUrl('');
    } catch (e) {
      setError(e.message || 'Failed to shorten URL. Please try again.');
    } finally {
      setLoading(false);
    }
  }, [url]);

  const handleKey = (e) => { if (e.key === 'Enter') shorten(); };

  const copy = async (text, id) => {
    try {
      await navigator.clipboard.writeText(text);
      setCopiedId(id);
      setTimeout(() => setCopiedId(null), 2000);
    } catch {}
  };

  const clearHistory = () => { setHistory([]); setLatest(null); };

  return React.createElement('div', { className: 'app' },
    React.createElement('div', { className: 'header' },
      React.createElement('div', { className: 'logo' },
        React.createElement('div', { className: 'logo-mark' },
          React.createElement('svg', { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5, strokeLinecap: 'round' },
            React.createElement('path', { d: 'M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71' }),
            React.createElement('path', { d: 'M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71' })
          )
        ),
        React.createElement('span', { className: 'logo-text' }, 'Snip')
      ),
      React.createElement('p', { className: 'tagline' }, '// serverless url shortener — built on aws')
    ),

    history.length > 0 && React.createElement('div', { className: 'stats-row' },
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'stat-val' }, history.length),
        React.createElement('div', { className: 'stat-label' }, 'links created')
      ),
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'stat-val' }, totalClicks),
        React.createElement('div', { className: 'stat-label' }, 'total clicks')
      ),
      React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'stat-val' }, history.length > 0 ? (totalClicks / history.length).toFixed(1) : '0'),
        React.createElement('div', { className: 'stat-label' }, 'avg clicks/link')
      )
    ),

    React.createElement('div', { className: 'input-card' },
      React.createElement('div', { className: 'input-row' },
        React.createElement('input', {
          className: 'url-input',
          type: 'text',
          placeholder: 'paste your long url here...',
          value: url,
          onChange: e => setUrl(e.target.value),
          onKeyDown: handleKey,
          disabled: loading
        }),
        React.createElement('button', {
          className: 'shorten-btn',
          onClick: shorten,
          disabled: loading
        }, loading
          ? React.createElement('span', { className: 'spinner' })
          : '→ snip'
        )
      ),
      error && React.createElement('p', { className: 'error-msg' }, '⚠ ' + error)
    ),

    latest && React.createElement('div', { className: 'result-card' },
      React.createElement('p', { className: 'result-label' }, '✓ link ready'),
      React.createElement('div', { className: 'result-row' },
        React.createElement('span', { className: 'result-url' }, latest.displayUrl),
        React.createElement('button', {
          className: `copy-btn ${copiedId === 'latest' ? 'copied' : ''}`,
          onClick: () => copy(latest.displayUrl, 'latest')
        }, copiedId === 'latest' ? 'copied!' : 'copy')
      )
    ),

    React.createElement('div', { className: 'section-header' },
      React.createElement('span', { className: 'section-title' }, 'link history'),
      history.length > 0 && React.createElement('button', { className: 'clear-btn', onClick: clearHistory }, 'clear all')
    ),

    history.length === 0
      ? React.createElement('div', { className: 'empty-state' },
          React.createElement('div', { className: 'empty-icon' }, '∅'),
          React.createElement('p', null, 'No links yet. Paste a URL above to get started.')
        )
      : React.createElement('div', { className: 'history-list' },
          ...history.map(item =>
            React.createElement('div', { className: 'history-item', key: item.id },
              React.createElement('div', { className: 'history-top' },
                React.createElement('span', { className: 'history-original' }, item.originalUrl),
                React.createElement('span', { className: 'history-time' }, timeAgo(item.createdAt))
              ),
              React.createElement('div', { className: 'history-bottom' },
                React.createElement('a', { className: 'history-short', href: item.shortUrl, target: '_blank', rel: 'noreferrer' }, item.displayUrl),
                React.createElement('div', { className: 'history-meta' },
                  React.createElement('div', { className: 'click-badge' },
                    React.createElement('div', { className: 'click-dot' }),
                    item.clicks + ' clicks'
                  ),
                  React.createElement('button', {
                    className: 'history-copy',
                    onClick: () => copy(item.displayUrl, item.id)
                  }, copiedId === item.id ? 'copied!' : 'copy')
                )
              )
            )
          )
        )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
